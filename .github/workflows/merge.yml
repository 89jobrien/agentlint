name: Merge

on:
  push:
    branches: [main, develop, "feature/*", "hotfix/*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_HOME: /home/runner/.cargo
  CARGO_TERM_COLOR: always

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.4
          sudo mv actionlint /usr/local/bin/
      - name: run actionlint
        run: actionlint -config-file .github/actionlint.yaml .github/workflows/*.yml

  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.detect.outputs.core }}
      frontmatter: ${{ steps.detect.outputs.frontmatter }}
      claude: ${{ steps.detect.outputs.claude }}
      cursor: ${{ steps.detect.outputs.cursor }}
      codex: ${{ steps.detect.outputs.codex }}
      gemini: ${{ steps.detect.outputs.gemini }}
      pi: ${{ steps.detect.outputs.pi }}
      opencode: ${{ steps.detect.outputs.opencode }}
      xtask: ${{ steps.detect.outputs.xtask }}
      docs: ${{ steps.detect.outputs.docs }}
      workflows: ${{ steps.detect.outputs.workflows }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: detect changes
        id: detect
        run: cargo xtask detect-changes HEAD^1

  lint:
    name: lint + fmt
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.core == 'true' ||
      needs.changes.outputs.frontmatter == 'true' ||
      needs.changes.outputs.claude == 'true' ||
      needs.changes.outputs.cursor == 'true' ||
      needs.changes.outputs.codex == 'true' ||
      needs.changes.outputs.gemini == 'true' ||
      needs.changes.outputs.pi == 'true' ||
      needs.changes.outputs.opencode == 'true' ||
      needs.changes.outputs.xtask == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: cargo xtask ci
        run: cargo xtask ci

  rustqual:
    name: rustqual
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.ref == 'refs/heads/main' && (
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.frontmatter == 'true' ||
        needs.changes.outputs.claude == 'true' ||
        needs.changes.outputs.cursor == 'true' ||
        needs.changes.outputs.codex == 'true' ||
        needs.changes.outputs.gemini == 'true' ||
        needs.changes.outputs.pi == 'true' ||
        needs.changes.outputs.opencode == 'true' ||
        needs.changes.outputs.xtask == 'true'
      )
    steps:
      - uses: actions/checkout@v5
      - name: install rustqual
        run: cargo install rustqual --locked
      - name: rustqual regression check
        run: rustqual --compare .rustqual-baseline.json --fail-on-regression

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.ref == 'refs/heads/main' && (
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.frontmatter == 'true' ||
        needs.changes.outputs.claude == 'true' ||
        needs.changes.outputs.cursor == 'true' ||
        needs.changes.outputs.codex == 'true' ||
        needs.changes.outputs.gemini == 'true' ||
        needs.changes.outputs.pi == 'true' ||
        needs.changes.outputs.opencode == 'true' ||
        needs.changes.outputs.xtask == 'true'
      )
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.ref == 'refs/heads/main' && (
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.frontmatter == 'true' ||
        needs.changes.outputs.claude == 'true' ||
        needs.changes.outputs.cursor == 'true' ||
        needs.changes.outputs.codex == 'true' ||
        needs.changes.outputs.gemini == 'true' ||
        needs.changes.outputs.pi == 'true' ||
        needs.changes.outputs.opencode == 'true' ||
        needs.changes.outputs.xtask == 'true'
      )
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2

  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.ref == 'refs/heads/main' && (
        needs.changes.outputs.core == 'true' ||
        needs.changes.outputs.frontmatter == 'true' ||
        needs.changes.outputs.claude == 'true' ||
        needs.changes.outputs.cursor == 'true' ||
        needs.changes.outputs.codex == 'true' ||
        needs.changes.outputs.gemini == 'true' ||
        needs.changes.outputs.pi == 'true' ||
        needs.changes.outputs.opencode == 'true' ||
        needs.changes.outputs.xtask == 'true'
      )
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: cargo machete

  ci-ok:
    name: CI passed
    runs-on: ubuntu-latest
    if: always()
    needs: [actionlint, changes, lint, rustqual, audit, deny, machete]
    steps:
      - name: check job results
        run: |
          results=(
            "${{ needs.actionlint.result }}"
            "${{ needs.changes.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.rustqual.result }}"
            "${{ needs.audit.result }}"
            "${{ needs.deny.result }}"
            "${{ needs.machete.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed: at least one job reported $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
