  - id: pre-commit-gate-fix
    doob_uuid: null
    name: pre-commit-gate-fix
    priority: P2
    status: completed
    title: Fix godmode pre-commit-gate deadlock on fmt+commit pipelines
    description: |-
      Naive `str contains "git commit"` blocked commands like
      `cargo fmt --all && git commit -m "..."` before fmt could run.
      Fixed by splitting on pipeline operators (&&, ;, |) and checking
      whether any segment starts with `git commit` or `git -C ... commit`.
      Patched both plugin cache copies and upstreamed to godmode repo (eebcf4b).
    files:
      - hooks/scripts/pre-commit-gate.nu
    completed: "2026-05-16"
